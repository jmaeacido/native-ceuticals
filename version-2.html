<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Native Ceuticals V2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="version-2.css?v=4">
</head>
<body>
  <svg class="svg-filters" aria-hidden="true" focusable="false">
    <defs>
      <filter id="v2-product-present" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
        <feMorphology in="SourceAlpha" operator="erode" radius="0.65" result="matteAlpha"/>
        <feGaussianBlur in="matteAlpha" stdDeviation="0.35" result="softMatte"/>
        <feComposite in="SourceGraphic" in2="softMatte" operator="in" result="cleanProduct"/>

        <feMorphology in="SourceAlpha" operator="erode" radius="3.5" result="solidCore"/>
        <feComposite in="SourceAlpha" in2="solidCore" operator="out" result="edgeShell"/>
        <feGaussianBlur in="edgeShell" stdDeviation="1.8" result="sourceBand"/>

        <feMorphology in="SourceAlpha" operator="erode" radius="1.8" result="innerAnchor"/>
        <feGaussianBlur in="innerAnchor" stdDeviation="6" result="glowCore"/>
        <feGaussianBlur in="innerAnchor" stdDeviation="13" result="glowHalo"/>

        <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" seed="11" stitchTiles="stitch" result="noise"/>
        <feColorMatrix in="noise" type="saturate" values="0" result="monoNoise"/>
        <feComponentTransfer in="monoNoise" result="grain">
          <feFuncA type="discrete" tableValues="0.18 0.42 0.28 0.56 0.34 0.68 0.22 0.74"/>
        </feComponentTransfer>

        <feComposite in="sourceBand" in2="grain" operator="in" result="grainBand"/>
        <feComponentTransfer in="grainBand" result="texturedBand">
          <feFuncA type="gamma" amplitude="1.22" exponent="0.52" offset="0.04"/>
        </feComponentTransfer>
        <feFlood flood-color="#cfcfcf" flood-opacity="0.62" result="bandFill"/>
        <feComposite in="bandFill" in2="texturedBand" operator="in" result="sourceGlow"/>

        <feComposite in="glowCore" in2="grain" operator="in" result="grainCore"/>
        <feComponentTransfer in="grainCore" result="texturedCore">
          <feFuncA type="gamma" amplitude="1.15" exponent="0.55" offset="0"/>
        </feComponentTransfer>
        <feFlood flood-color="#d0d0d0" flood-opacity="0.5" result="coreFill"/>
        <feComposite in="coreFill" in2="texturedCore" operator="in" result="innerGlow"/>

        <feComposite in="glowHalo" in2="grain" operator="in" result="grainHalo"/>
        <feFlood flood-color="#9a9a9a" flood-opacity="0.26" result="haloFill"/>
        <feComposite in="haloFill" in2="grainHalo" operator="in" result="outerGlow"/>

        <feMerge result="allGlow">
          <feMergeNode in="outerGlow"/>
          <feMergeNode in="innerGlow"/>
          <feMergeNode in="sourceGlow"/>
        </feMerge>

        <feMorphology in="SourceAlpha" operator="dilate" radius="14" result="clipMask"/>
        <feGaussianBlur in="clipMask" stdDeviation="1.8" result="softClip"/>
        <feComposite in="allGlow" in2="softClip" operator="in" result="clippedGlow"/>

        <feMerge>
          <feMergeNode in="clippedGlow"/>
          <feMergeNode in="cleanProduct"/>
        </feMerge>
      </filter>
    </defs>
  </svg>

  <main class="v2-shell" data-active="sunscreen">
    <section class="v2-stage" aria-label="Native Ceuticals monochrome ritual showcase">
      <div class="v2-backdrop" aria-hidden="true"></div>
      <div class="v2-grid" aria-hidden="true"></div>

      <header class="v2-brand">
        <span>Native Ceuticals</span>
        <h1>Skin Rituals<br>In Monochrome</h1>
        <p>Clean formula essentials presented as a sculptural skincare system.</p>
      </header>

      <div class="v2-orbit" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="v2-sparks" aria-hidden="true"></div>

      <figure class="v2-product-display">
        <span class="v2-glow" aria-hidden="true"></span>
        <div class="v2-product-shot">
          <img id="v2-product-image" src="assets/subjects/sunscreen.png" alt="Sunscreen">
        </div>
      </figure>

      <aside class="v2-copy" aria-live="polite">
        <span id="v2-kicker">Daily Defense</span>
        <h2 id="v2-title">Sunscreen</h2>
        <p id="v2-description">A mineral SPF cream that helps protect skin from daily UV exposure with a clean, lightweight finish.</p>
        <dl>
          <div>
            <dt>Texture</dt>
            <dd id="v2-texture">Lightweight cream</dd>
          </div>
          <div>
            <dt>Moment</dt>
            <dd id="v2-moment">AM protection</dd>
          </div>
        </dl>
      </aside>

      <nav class="v2-rail" aria-label="Choose product">
        <button type="button" data-key="night" data-title="Night Cream" data-kicker="PM Repair" data-image="assets/subjects/night2.png" data-description="A collagen-enhancing night moisturizer made to support skin renewal while you sleep." data-texture="Rich moisturizer" data-moment="Night ritual">Night</button>
        <button type="button" data-key="retinol" data-title="Retinol Treatment" data-kicker="Refining Serum" data-image="assets/subjects/serum%20retinol.png" data-description="A serum with retinol, peptides, and hyaluronic acid for smoother, refreshed-looking skin." data-texture="Silky serum" data-moment="Evening treatment">Retinol</button>
        <button class="is-active" type="button" data-key="sunscreen" data-title="Sunscreen" data-kicker="Daily Defense" data-image="assets/subjects/sunscreen.png" data-description="A mineral SPF cream that helps protect skin from daily UV exposure with a clean, lightweight finish." data-texture="Lightweight cream" data-moment="AM protection">SPF</button>
        <button type="button" data-key="cleanser" data-title="Cleanser" data-kicker="Clean Start" data-image="assets/subjects/cleanser.png" data-description="A gentle foaming cleanser that lifts away buildup while keeping the skin barrier comfortable." data-texture="Soft foam" data-moment="AM / PM cleanse">Cleanser</button>
        <button type="button" data-key="day" data-title="Day Cream" data-kicker="Brightening Care" data-image="assets/subjects/day.png" data-description="A brightening daily moisturizer with SPF to hydrate, protect, and prep skin for the day." data-texture="Daily moisturizer" data-moment="Morning prep">Day</button>
      </nav>
    </section>
  </main>

  <script>
    (function () {
      const shell = document.querySelector(".v2-shell");
      const buttons = Array.from(document.querySelectorAll(".v2-rail button"));
      const image = document.getElementById("v2-product-image");
      const kicker = document.getElementById("v2-kicker");
      const title = document.getElementById("v2-title");
      const description = document.getElementById("v2-description");
      const texture = document.getElementById("v2-texture");
      const moment = document.getElementById("v2-moment");

      function activate(button) {
        buttons.forEach((item) => {
          const active = item === button;
          item.classList.toggle("is-active", active);
          item.setAttribute("aria-pressed", active ? "true" : "false");
        });

        shell.dataset.active = button.dataset.key;
        image.src = button.dataset.image;
        image.alt = button.dataset.title;
        kicker.textContent = button.dataset.kicker;
        title.textContent = button.dataset.title;
        description.textContent = button.dataset.description;
        texture.textContent = button.dataset.texture;
        moment.textContent = button.dataset.moment;
      }

      buttons.forEach((button) => {
        button.setAttribute("aria-pressed", button.classList.contains("is-active") ? "true" : "false");
        button.addEventListener("click", () => activate(button));
        button.addEventListener("mouseenter", () => activate(button));
        button.addEventListener("focus", () => activate(button));
      });

      const sparks = document.querySelector(".v2-sparks");
      if (sparks) {
        for (let i = 0; i < 24; i += 1) {
          const spark = document.createElement("span");
          spark.className = "v2-spark";
          spark.style.setProperty("--x", `${34 + Math.random() * 32}%`);
          spark.style.setProperty("--y", `${18 + Math.random() * 58}%`);
          spark.style.setProperty("--size", `${1 + Math.random() * 2.2}px`);
          spark.style.setProperty("--delay", `${Math.random() * 7}s`);
          spark.style.setProperty("--duration", `${3.5 + Math.random() * 7}s`);
          spark.style.setProperty("--drift", `${-1.2 + Math.random() * 2.4}rem`);
          sparks.append(spark);
        }
      }
    })();
  </script>
</body>
</html>
